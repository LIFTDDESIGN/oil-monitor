name: Oil & Market Alert Monitor v2

on:
  schedule:
    - cron: "*/30 * * * *"   # Every 30 minutes, 24/7
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install yfinance

      - name: Run monitor
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python monitor.py

      - name: Save state back to repo
        run: |
          git config user.name  "Oil Monitor Bot"
          git config user.email "oil-monitor@github-actions"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push
